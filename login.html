<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalentPool ATS — Sign In</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0b3fb0,#1763ff 55%,#3b82f6)}
  .login{width:100%;max-width:390px;border:none;border-radius:18px;box-shadow:0 24px 60px rgba(0,0,0,.3)}
  .logo{width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,#1763ff,#3b82f6);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.6rem}
  .btn-primary{background:linear-gradient(135deg,#1763ff,#3b82f6);border:none}
</style>
</head>
<body>
<div class="card login p-4">
  <div class="text-center mb-3">
    <img src="https://lh3.googleusercontent.com/d/1PWsOqZk2FAfbtIqtt6qn4eO5Ljvqh2Lr=w160" onerror="this.style.display='none'" style="max-height:54px;margin-bottom:8px">
    <div class="logo mx-auto mb-2"><i class="bi bi-people-fill"></i></div>
    <h4 class="fw-bold mb-0">TalentPool ATS</h4>
    <p class="text-muted small">Recruitment workspace access</p>
  </div>
  <label class="form-label small fw-semibold">Username</label>
  <input class="form-control mb-2" id="username" autocomplete="username">
  <label class="form-label small fw-semibold">Password</label>
  <input class="form-control" id="password" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')attemptLogin()">
  <button class="btn btn-primary w-100 mt-3 fw-semibold" onclick="attemptLogin()">Sign In</button>
  <div id="message" class="text-center small fw-semibold mt-3"></div>
</div>
<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbyolj6zhQxfM7EgS4I5SFQfh-GO8Ofo20ln-c23aek8hpCX9-z561tJXTj62QDg2z-R6w/exec";
  function attemptLogin(){
    const u=document.getElementById('username').value,p=document.getElementById('password').value,msg=document.getElementById('message');
    if(!u||!p){msg.className="text-center small fw-semibold mt-3 text-danger";msg.innerText="Please complete all fields.";return;}
    msg.className="text-center small fw-semibold mt-3 text-primary";msg.innerText="Authenticating…";
    fetch(`${API_URL}?action=login&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`,{method:"GET",redirect:"follow"})
      .then(r=>r.json()).then(res=>{
        if(res.status==="success"){
          localStorage.setItem("portalSession","authenticated");
          localStorage.setItem("portalUser",res.user||u);
          localStorage.setItem("portalRole",res.role||"Recruiter");
          localStorage.setItem("portalJobs",res.assignedJobs||"");
          localStorage.setItem("portalRights",res.rights||"");
          window.location.href="index.html";
        } else { msg.className="text-center small fw-semibold mt-3 text-danger";msg.innerText=res.message; }
      }).catch(()=>{ msg.className="text-center small fw-semibold mt-3 text-danger";msg.innerText="Connection lost. Check API deployment."; });
  }
</script>
</body>
</html>
